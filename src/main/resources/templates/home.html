<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head th:replace="~{fragments :: head}">
    <title>Conecta Arena - Home</title>
</head>
<body>

<div th:replace="~{fragments :: cabecalho}"></div>

<div class="banner-section"></div>

<div class="container">
    <div class="events-content">
        <div class="events-column">
            <div class="filters-container">
                <a th:href="@{/}"
                   th:classappend="${categoriaSelecionada == 'Todos'} ? 'active' : ''"
                   class="filter-btn">Todos</a>

                <a th:href="@{/(categoria='Cultural')}"
                   th:classappend="${categoriaSelecionada == 'Cultural'} ? 'active' : ''"
                   class="filter-btn">Cultural</a>

                <a th:href="@{/(categoria='Esportivo')}"
                   th:classappend="${categoriaSelecionada == 'Esportivo'} ? 'active' : ''"
                   class="filter-btn">Esportivo</a>

                <a th:href="@{/(categoria='Corporativo')}"
                   th:classappend="${categoriaSelecionada == 'Corporativo'} ? 'active' : ''"
                   class="filter-btn">Corporativo</a>
            </div>

            <div class="events-grid">
                <div class="event-card" th:each="evento : ${eventos}">
                    <img th:src="${evento.urlImagem}" class="card-img-top" alt="Imagem do Evento">
                    <div class="card-body">
                        <span class="card-category" th:text="${evento.categoria}">CATEGORIA</span>
                        <h5 class="card-title" th:text="${evento.titulo}">Nome do Evento</h5>
                        <div class="event-info">
                            <p>📅 <span th:text="${#temporals.format(evento.data, 'dd/MM/yyyy - HH:mm')}"></span></p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a th:href="@{/eventos/{id}(id=${evento.id})}" class="btn btn-purchase">
                            VER EVENTO
                        </a>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(eventos)}" class="alert-warning">
                    <h4>Nenhum evento encontrado</h4>
                    <p>Tente selecionar outra categoria ou volte mais tarde!</p>
                </div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="suggestion-box">
                <h5>ALGUMA IDEIA DE EVENTO?</h5>
                <p>Ajude-nos a tornar a Arena Pernambuco ainda mais incrível!</p>

                <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>
                <div th:if="${msgErro}" class="alert alert-danger" th:text="${msgErro}"></div>

                <form th:action="@{/sugestoes}" method="post">
                    <textarea class="form-control" name="texto" rows="6"
                              placeholder="Sua sugestão... (mín. 20 caracteres)" required></textarea>
                    <button type="submit" class="btn btn-outline-dark">SUGIRA SEU EVENTO</button>
                </form>
            </div>
        </aside>
    </div>
</div>

<footer>
    <p>&copy; 2026 Conecta Arena Pernambuco</p>
</footer>

</body>
</html>
