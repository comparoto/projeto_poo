<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head th:replace="~{fragments :: head}">
    <title>Conecta Arena - Detalhes</title>
</head>
<body>

<div th:replace="~{fragments :: cabecalho}"></div>

<div class="container">
    <div th:if="${mensagemSucesso}" class="alert alert-success" th:text="${mensagemSucesso}"></div>
    <div th:if="${mensagemErro}" class="alert alert-danger" th:text="${mensagemErro}"></div>

    <div class="event-detail-card">
        <img th:src="${evento.imagem}" class="event-detail-img" alt="Banner do Evento">

        <div class="card-body">
            <span class="card-category" th:text="${evento.categoria}">CATEGORIA</span>
            <h1 class="detail-title" th:text="${evento.titulo}">Título do Evento</h1>

            <div class="event-info">
                <p class="detail-info-text">📅 Data: <span th:text="${#temporals.format(evento.data, 'dd/MM/yyyy - HH:mm')}"></span></p>
                <p class="detail-location-text">🏟️ Local: Arena Pernambuco</p>
                <p>🎟️ Vagas disponíveis: <span th:text="${evento.ingressosDisponiveis - evento.ingressosVendidos}"></span></p>

                <p class="text-success-green">
                    R$ <span th:text="${#numbers.formatDecimal(evento.preco, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                </p>
            </div>

            <div class="detail-actions">
                <div id="secaoBotaoComprar">
                    <button th:if="${session.usuarioLogado != null}" type="button" onclick="mostrarPagamento()" class="btn btn-purchase">
                        COMPRAR INGRESSO
                    </button>
                    <a th:if="${session.usuarioLogado == null}" th:href="@{/login}" class="btn btn-purchase" style="display: block; text-align: center; background-color: #555;">
                        FAÇA LOGIN PARA COMPRAR
                    </a>
                </div>

                <div id="caixaConfirmacao" class="purchase-confirm-box" style="display: none;">
                    <h4 class="card-title-center">Finalizar Pagamento</h4>

                    <form th:action="@{/eventos/comprar}" method="post">
                        <input type="hidden" name="eventoId" th:value="${evento.id}">

                        <input type="hidden" name="usuarioId" th:value="${session.usuarioLogado != null ? session.usuarioLogado.id : ''}">
                        <input type="hidden" id="precoUnitario" th:value="${evento.preco}">

                        <div class="event-info">
                            <label class="label-bold">Quantidade:</label>
                            <input type="number" id="inputQuantidade" name="quantidade" class="form-control" value="1" min="1" max="5">
                        </div>

                        <div class="event-info">
                            <label class="label-bold">Forma de Pagamento:</label>
                            <select name="formaPagamento" class="form-control">
                                <option value="PIX">Pix (Aprovação Instantânea)</option>
                                <option value="CARTÃO">Cartão de Crédito</option>
                                <option value="BOLETO">Boleto Bancário</option>
                            </select>
                        </div>

                        <div class="total-box">
                            <span class="total-label">Total a pagar:</span><br>
                            <strong class="total-value">R$ <span id="valorTotalExibido" th:text="${#numbers.formatDecimal(evento.preco, 1, 'POINT', 2, 'COMMA')}"></span></strong>
                        </div>

                        <button type="submit" class="btn btn-pay">CONFIRMAR E PAGAR</button>
                    </form>

                    <button type="button" onclick="cancelarCompra()" class="btn-cancel">
                        Cancelar compra
                    </button>
                </div>

                <a th:href="@{/eventos}" class="btn-back">
                    ← Voltar para a programação
                </a>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Conecta Arena Pernambuco</p>
</footer>

<script th:inline="javascript">
    function mostrarPagamento() {
        document.getElementById('secaoBotaoComprar').style.display = 'none';
        document.getElementById('caixaConfirmacao').style.display = 'block';
    }
    function cancelarCompra() {
        document.getElementById('secaoBotaoComprar').style.display = 'block';
        document.getElementById('caixaConfirmacao').style.display = 'none';
    }
    document.addEventListener('DOMContentLoaded', function() {
        const inputQtde = document.getElementById('inputQuantidade');
        const precoUnitElement = document.getElementById('precoUnitario');
        const displayTotal = document.getElementById('valorTotalExibido');
        if (inputQtde && precoUnitElement) {
            const precoUnit = parseFloat(precoUnitElement.value);
            inputQtde.addEventListener('input', function() {
                let qtde = parseInt(this.value) || 1;
                if (qtde < 1) qtde = 1; if (qtde > 5) qtde = 5;
                const total = qtde * precoUnit;
                displayTotal.innerText = total.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            });
        }
    });
</script>
</body>
</html>
